{% extends "base.html" %}

{% block title %}Crear Cuenta — Sistema de Cursos{% endblock %}

{% block extra_css %}
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }

        main {
            width: 100%;
            max-width: 480px; /* Ajustado ligeramente para acomodar campos paralelos */
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--green-soft), var(--green-mid));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            border: 3px solid var(--green-mid);
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.9rem;
            color: var(--green-deep);
            margin-bottom: 0.3rem;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* Diseño en filas para apellidos y datos secundarios */
        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        /* 🌟 FUERZA VISUAL: Aplicamos los estilos de los inputs de texto a los nuevos tipos */
        .card input[type="email"],
        .card input[type="tel"],
        .card input[type="date"] {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            border: 1px solid var(--green-light, #e2e8f0);
            border-radius: 8px;
            background-color: var(--bg-input, #f4fbf7); /* Mismo tono verde sutil de fondo */
            color: var(--text-main, #2d3748);
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        /* Efecto Focus uniforme al hacer clic en las casillas */
        .card input[type="email"]:focus,
        .card input[type="tel"]:focus,
        .card input[type="date"]:focus {
            outline: none;
            border-color: var(--green-mid);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15);
        }

        .divider {
            border: none;
            border-top: 1.5px solid var(--green-light);
            margin: 1.5rem 0;
        }

        .login-link {
            text-align: center;
            margin-top: 1.4rem;
            font-size: 0.88rem;
            color: var(--text-light);
        }

        .flash-container { max-width: 480px; }
    </style>
{% endblock %}

{% block content %}
    <div class="register-header">
        <div class="register-icon">✨</div>
        <h1>Crear Cuenta</h1>
        <p class="subtitle">Completa el formulario para registrarte</p>
    </div>

    <div class="card">
        <form method="POST" action="{{ url_for('register.register') }}">

            <input type="hidden" id="rol" name="rol" value="usuario">

            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre"
                       placeholder="Elige un nombre único" autocomplete="username" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="apellido_paterno">Apellido Paterno</label>
                    <input type="text" id="apellido_paterno" name="apellido_paterno"
                           placeholder="Paterno" required>
                </div>
                <div class="form-group">
                    <label for="apellido_materno">Apellido Materno</label>
                    <input type="text" id="apellido_materno" name="apellido_materno"
                           placeholder="Materno (Opcional)">
                </div>
            </div>

            <div class="form-group">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" name="correo"
                       placeholder="tu_correo@ejemplo.com" autocomplete="email" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono"
                           placeholder="10 dígitos" required>
                </div>
                <div class="form-group">
                    <label for="fecha_nacimiento">F. de Nacimiento</label>
                    <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
                </div>
            </div>

            <div class="form-group">
                <label for="contrasena">Contraseña</label>
                <input type="password" id="contrasena" name="contrasena"
                       placeholder="Mínimo 6 caracteres" required>
            </div>

            <div class="form-group">
                <label for="confirmar_contrasena">Confirmar Contraseña</label>
                <input type="password" id="confirmar_contrasena" name="confirmar_contrasena"
                       placeholder="Repite tu contraseña" required>
            </div>

            <hr class="divider">

            <button type="submit" class="btn-primary">Crear Cuenta</button>
        </form>

        <p class="login-link">
            ¿Ya tienes cuenta?
            <a href="{{ url_for('auth.login') }}" class="link-subtle">Inicia sesión</a>
        </p>
    </div>
{% endblock %}
