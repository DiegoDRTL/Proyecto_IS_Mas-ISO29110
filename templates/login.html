{% extends "base.html" %}

{% block title %}Iniciar Sesión — Sistema de Cursos{% endblock %}

{% block extra_css %}
<style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; }

    main {
        width: 100%;
        max-width: 440px;
        animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .login-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .login-icon {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, var(--green-light), var(--green-soft));
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
        font-size: 2rem;
        border: 3px solid var(--green-mid);
    }

    h1 {
        font-family: 'DM Serif Display', serif;
        font-size: 1.9rem;
        color: var(--green-deep);
        margin-bottom: 0.3rem;
    }

    .subtitle {
        color: var(--text-light);
        font-size: 0.9rem;
    }

    .divider {
        border: none;
        border-top: 1.5px solid var(--green-light);
        margin: 1.5rem 0;
    }

    .register-link {
        text-align: center;
        margin-top: 1.4rem;
        font-size: 0.88rem;
        color: var(--text-light);
    }

    .flash-container { max-width: 440px; }
</style>
{% endblock %}

{% block content %}
<div class="login-header">
    <div class="login-icon">🎓</div>
    <h1>Bienvenido</h1>
    <p class="subtitle">Ingresa tus credenciales para continuar</p>
</div>

<div class="card">
    <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="form-group">
            <label for="nombre_usuario">Usuario</label>
            <input type="text" id="nombre_usuario" name="nombre_usuario"
                   placeholder="Tu nombre de usuario" autocomplete="username" required>
        </div>

        <div class="form-group">
            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" name="contrasena"
                   placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <hr class="divider">

        <button type="submit" class="btn-primary">Iniciar Sesión</button>
    </form>

    <p class="register-link">
        ¿No tienes cuenta?
        <a href="{{ url_for('auth.register') }}" class="link-subtle">Regístrate aquí</a>
    </p>
</div>
{% endblock %}
